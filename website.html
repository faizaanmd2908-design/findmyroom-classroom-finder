<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Classroom Availability Finder Tool</title>
  <link rel="stylesheet" href="website.css"/>
</head>

<body>
  <header class="head">
    <div class="container">
      <h1>Campus Classroom Availability Finder Tool</h1>
      <p class="tagline">Find free classrooms in seconds.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Check Availability</h2>

      <div class="grid">
        <div class="field">
          <label for="cluster">Cluster</label>
          <select id="cluster">
            <option value="" selected disabled>Select cluster</option>
            <option value="1">Cluster 1</option>
            <option value="2">Cluster 2</option>
            <option value="3">Cluster 3</option>
            <option value="4">Cluster 4</option>
          </select>
        </div>

        <div class="field">
          <label for="day">Day</label>
          <select id="day">
            <option value="" selected disabled>Select day</option>
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
          </select>
        </div>

        <div class="field">
          <label for="hour">Hour</label>
          <select id="hour">
            <option value="" selected disabled>Select hour</option>
            <option value="1">Hour 1</option>
            <option value="2">Hour 2</option>
            <option value="3">Hour 3</option>
            <option value="4">Hour 4</option>
            <option value="5">Hour 5</option>
            <option value="6">Hour 6</option>
            <option value="7">Hour 7</option>
            <option value="8">Hour 8</option>
          </select>
        </div>
      </div>

      <button id="btnFind" class="btn">Find Available Classrooms</button>
      <p id="hint" class="hint">Tip: Try Cluster 1 → Monday → Hour 3</p>
    </section>

    <section class="card">
      <div class="result-head">
        <h2>Result</h2>
        <span id="meta" class="meta"></span>
      </div>

      <div id="result" class="result">
        <p class="muted">Select cluster, day and hour, then click the button.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Developed by Mohammad Faizaan</p>
    </div>
  </footer>
<script src="website.js"></script>
</body>
</html>
